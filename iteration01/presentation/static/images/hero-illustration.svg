      <stop offset="0%" stop-color="#13132a"/>
      <stop offset="100%" stop-color="#0a0a16"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0c84a"/>
      <stop offset="100%" stop-color="#c9a82a"/>
    </linearGradient>
    <linearGradient id="card-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e3a"/>
      <stop offset="100%" stop-color="#13132a"/>
    </linearGradient>
    <linearGradient id="sidebar-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="100%" stop-color="#07070d"/>
