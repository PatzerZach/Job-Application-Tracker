<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="AppTrackr - Your intelligent job application tracker. Organize, monitor, and command every step of your job search."/>
  <title>{% block title %}AppTrackr{% endblock %} - Job Application Tracker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="icon" type="image/svg+xml" href="/static/images/logo-placeholder.svg"/>
  <link rel="stylesheet" href="/static/css/style.css"/>

  <script>
    (function(){
      var t = localStorage.getItem('apptrackr-theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  {% block head %}{% endblock %}
</head>
<body>
<canvas id="particles-canvas" aria-hidden="true"></canvas>

{% block body %}{% endblock %}

<div class="modal-overlay" id="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirm-modal-title">
  <div class="modal">
    <h3 class="modal-title" id="confirm-modal-title">Confirm Action</h3>
    <p class="modal-desc" id="confirm-message">Are you sure you want to delete this? This cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn btn-glass" id="confirm-no">Cancel</button>
      <button class="btn btn-danger" id="confirm-yes">Delete</button>
    </div>
  </div>
</div>

<div class="modal-overlay document-preview-overlay" id="document-preview-modal" role="dialog" aria-modal="true" aria-labelledby="document-preview-title">
  <div class="modal document-preview-modal">
    <div class="document-preview-header">
      <div class="document-preview-heading">
        <div class="document-viewer-eyebrow">
          <span class="document-viewer-chip" id="document-preview-type">Document</span>
          <span class="document-viewer-chip document-viewer-chip-soft" id="document-preview-extension">FILE</span>
        </div>
        <h3 class="document-preview-title" id="document-preview-title">Preview</h3>
        <p class="document-preview-subtitle" id="document-preview-filename">Stored file</p>
      </div>
      <div class="document-preview-toolbar">
        <a href="#" class="btn btn-secondary btn-sm" id="document-preview-open" target="_blank" rel="noreferrer">Open Raw</a>
        <a href="#" class="btn btn-glass btn-sm" id="document-preview-download" target="_blank" rel="noreferrer">Download</a>
        <button class="btn btn-glass btn-sm btn-icon" id="document-preview-close" type="button" aria-label="Close preview">
          <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z"/></svg>
        </button>
      </div>
    </div>

    <div class="document-preview-body">
      <div class="document-preview-loading" id="document-preview-loading">
        <div class="document-preview-spinner" aria-hidden="true"></div>
      </div>

      <div class="document-viewer-frame-shell" id="document-preview-frame-shell" hidden>
        <iframe class="document-viewer-frame" id="document-preview-frame" title="Document preview" loading="lazy" allowfullscreen></iframe>
      </div>

      <div class="document-preview-pdf-shell" id="document-preview-pdf-shell" hidden>
        <div class="document-preview-pdf-stage" id="document-preview-pdf-stage"></div>
      </div>

      <div class="document-preview-docx-shell" id="document-preview-docx-shell" hidden>
        <div class="document-preview-docx-stage" id="document-preview-docx-stage"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="true"></div>

<footer class="site-meta-footer" role="contentinfo">
  <div class="site-meta-footer-inner">
    <span>Built for focused job tracking.</span>
    <a href="https://github.com/PatzerZach/Job-Application-Tracker" target="_blank" rel="noreferrer">GitHub</a>
    <span class="site-meta-sep">|</span>
    <span>Powered by <a href="https://www.geoapify.com/" target="_blank" rel="noreferrer">Geoapify</a></span>
  </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docx-preview@0.3.6/dist/docx-preview.min.js"></script>
<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
